<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO LIST - Home</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body {
            background: #f1f5f9;
        }

        .todo-card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .todo-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .task-text {
            font-weight: 500;
        }

        .scroll-box {
            height: 450px;
            overflow-y: auto;
        }

        .add-box {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container py-4">

    <!-- Header -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">📝 Django ToDo App</h2>
        <p class="text-muted">{% now "jS F Y" %}</p>
    </div>

    <div class="row g-4">

        <!-- Pending Tasks -->
        <div class="col-md-7">
            <h5 class="mb-3">🔥 My Day</h5>

            <div class="scroll-box">

                {% for task in tasks %}
                <div class="card todo-card mb-2 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">

                        <span class="task-text">{{ task.task }}</span>

                        <div>
                            <a href="{% url 'mark_as_done' task.pk %}" class="btn btn-success btn-sm">
                                <i class="fa fa-check"></i>
                            </a>

                            <a href="{% url 'edit_task' task.id %}" class="btn btn-primary btn-sm">
                                <i class="fa fa-pencil"></i>
                            </a>

                            <a href="{% url 'delete_task' task.id %}" class="btn btn-danger btn-sm">
                                <i class="fa fa-trash"></i>
                            </a>
                        </div>

                    </div>
                </div>
                {% endfor %}

            </div>
        </div>

        <!-- Completed Tasks -->
        <div class="col-md-5">
            <h5 class="mb-3">✅ Completed</h5>

            {% for task in completed_tasks %}
            <div class="card todo-card mb-2 bg-light">
                <div class="card-body d-flex justify-content-between align-items-center">

                    <span class="text-decoration-line-through text-muted">
                        {{ task.task }}
                    </span>

                    <a href="{% url 'mark_as_undone' task.pk %}" class="btn btn-warning btn-sm">
                        Undo
                    </a>

                </div>
            </div>
            {% endfor %}
        </div>

    </div>

    <!-- Add Task Form -->
    <div class="row mt-4">
        <div class="col-md-7">

            <form action="{% url 'addTask' %}" method="POST" class="add-box shadow-sm">
                {% csrf_token %}

                <div class="input-group">
                    <input type="text" name="task" class="form-control" placeholder="✨ Add a new task..." required>
                    
                    <button class="btn btn-primary">
                        <i class="fa fa-plus"></i> Add
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
