<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - Django TODO App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body {
            background: #f1f5f9;
        }

        .edit-card {
            border: none;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card edit-card shadow-lg p-4" style="width: 500px;">

        <!-- Title -->
        <h4 class="text-center mb-3">✏️ Edit Task</h4>

        <!-- Form -->
        <form action="{% url 'edit_task' get_task.pk %}" method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input 
                    type="text" 
                    name="task" 
                    class="form-control form-control-lg"
                    placeholder="Update your task..."
                    value="{{ get_task.task }}"
                    required
                >
            </div>

            <!-- Buttons -->
            <div class="d-grid gap-2">

                <button type="submit" class="btn btn-primary">
                    <i class="fa fa-save"></i> Update Task
                </button>

                <a href="/" class="btn btn-outline-secondary">
                    <i class="fa fa-arrow-left"></i> Back
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
